# Import pipeline — reads NDJSON files exported by logstash-es-export and
# writes to the demos-aircraft-adsb data stream on the target project.
#
# Place exported .ndjson files in the logstash/files/ directory (or the
# export/ directory if running inside logstash-es-export), then run:
#
#   docker compose exec logstash bin/logstash \
#     -f /usr/share/logstash/pipeline/migrate-import.conf \
#     --pipeline.id migrate-import --path.data /tmp/migrate-import-data
#
# Env vars required:
#   ELASTICSEARCH_HOST  — target Elasticsearch endpoint
#   ELASTICSEARCH_API_KEY — target API key (base64-encoded id:key)
#
# Compatible with the logstash-es-export project conventions.
# action => "create" makes reruns idempotent (skips existing docs).
#
# TSDS prerequisite: The demos-aircraft-adsb index template uses
# index.mode: time_series, which rejects documents outside the current
# backing index's time window (~2 hours by default). Before running this
# pipeline with historical data, temporarily widen the template's
# time_series.start_time / end_time. See docs/MIGRATION.md step 8.

input {
    file {
        path => "/usr/share/logstash/export/*.ndjson"
        codec => "json_lines"
        mode => "read"
        sincedb_path => "/tmp/migrate-import-sincedb"
        file_completed_action => "log"
        file_completed_log_path => "/tmp/migrate-import-completed.log"
        exit_after_read => true
    }
}

filter {
    mutate {
        remove_field => ["@version", "event", "host", "log", "path", "@metadata"]
    }
}

output {
    elasticsearch {
        id => "ES Import Output"
        hosts => ["${ELASTICSEARCH_HOST}"]
        api_key => "${ELASTICSEARCH_API_KEY}"
        data_stream => true
        action => "create"
    }

    stdout {
        codec => "dots"
    }
}
