## Polling Strategy — heartbeat ➜ OAuth2 token ➜ API call
#
# Logstash's http_poller input plugin can poll a URL on a schedule but only
# supports basic auth and static headers — it cannot perform an OAuth2 token
# exchange before each request, so it won't work with the OpenSky API.
#
# The workaround chains three stages inside a single pipeline:
#
#   1. heartbeat input  — fires a synthetic event every N seconds (the poll timer).
#   2. http filter (1)  — exchanges OAuth2 client credentials for a short-lived
#                         access token via the OpenSky Keycloak endpoint. The token
#                         is stored in [@metadata] so it never reaches Elasticsearch.
#   3. http filter (2)  — calls the OpenSky /states/all REST API with the bearer
#                         token from step 2. The JSON response body becomes the
#                         event payload for downstream processing.
#
# On any HTTP failure (token or API), the event is tagged _httprequestfailure
# and dropped before it reaches the output.

input {
    heartbeat {
        id => "OpenSky Poll Timer"
        interval => 360
        message => "poll"
    }
}

filter {

    # Step 1 — OAuth2 client-credentials grant. The access token is stored under
    # [@metadata] so it is ephemeral and never indexed.
    http {
        id => "Fetch OpenSky OAuth2 Token"
        url => "https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token"
        verb => "POST"
        headers => {
            "Content-Type" => "application/x-www-form-urlencoded"
        }
        body => "grant_type=client_credentials&client_id=${OPENSKY_API_CLIENT_ID}&client_secret=${OPENSKY_API_CLIENT_SECRET}"
        target_body => "[@metadata][token_response]"
        target_headers => "[@metadata][token_headers]"
    }

    # Step 2 — Fetch aircraft state vectors for this quadrant (Q3: South-West).
    # The bearer token from Step 1 is interpolated into the Authorisation header.
    http {
        id => "Fetch OpenSky Aircraft States"
        url => "https://opensky-network.org/api/states/all?lamin=-90&lomin=-180&lamax=0&lomax=0"
        verb => "GET"
        headers => {
            "Authorization" => "Bearer %{[@metadata][token_response][access_token]}"
            "Accept" => "application/json"
        }
        target_body => "[message]"
        target_headers => "[@metadata][opensky_headers]"
    }

    # Drop the event if either HTTP call failed or the API returned no states.
    if "_httprequestfailure" in [tags] or ![message][states] {
        drop {}
    }

    split {
        id => "Split List of Events"
        field => "[message][states]"
        target => "[data]"
        remove_field => [
            "[event][original]",
            "message"
        ]
    }

    # icao24              string        Unique ICAO 24-bit address of the transponder in hex string representation                                      
    # callsign            string        Callsign of the vehicle (8 chars). Can be null if no callsign has been received                                      
    # origin_country      string        Country name inferred from the ICAO 24-bit address                                                      
    # time_position       integer       Unix timestamp (seconds) for the last position update. Can be null if no position report was received by OpenSky within the past 15s                                                      
    # last_contact        integer       Unix timestamp (seconds) for the last update in general. This field is updated for any new, valid message received from the transponder                                              
    # longitude           float         WGS-84 longitude in decimal degrees. Can be null                                              
    # latitude            float         WGS-84 latitude in decimal degrees. Can be null                                      
    # baro_altitude       float         Barometric altitude in meters. Can be null                                                      
    # on_ground           boolean       Boolean value which indicates if the position was retrieved from a surface position report                                              
    # velocity            float         Velocity over ground in m/s. Can be null.                                
    # true_track          float         True track in decimal degrees clockwise from north (north=0°). Can be null                                              
    # vertical_rate       float         Vertical rate in m/s. A positive value indicates that the airplane is climbing, a negative value indicates that it descends. Can be null                                                      
    # sensors             integer[]     IDs of the receivers which contributed to this state vector. Is null if no filtering for sensor was used in the request                                      
    # geo_altitude        float         Geometric altitude in meters. Can be null                                              
    # squawk              string        The transponder code aka Squawk. Can be null                                      
    # spi                 boolean       Whether flight status indicates special purpose indicator                              
    # position_source     integer       Origin of this state's position: 0 = ADS-B, 1 = ASTERIX, 2 = MLAT                                                    

    mutate {
        id => "Copy fields from data array to top level"
        add_field => {
            "[icao24]" => "%{[data][0]}"                
            "[callsign]" => "%{[data][1]}"              
            "[origin_country]" => "%{[data][2]}"        
            "[time_position]" => "%{[data][3]}"         
            "[last_contact]" => "%{[data][4]}"          
            "[longitude]" => "%{[data][5]}"             
            "[latitude]" => "%{[data][6]}"              
            "[baro_altitude]" => "%{[data][7]}"         
            "[on_ground]" => "%{[data][8]}"             
            "[velocity]" => "%{[data][9]}"              
            "[true_track]" => "%{[data][10]}"           
            "[vertical_rate]" => "%{[data][11]}"        
            "[sensors]" => "%{[data][12]}"              
            "[geo_altitude]" => "%{[data][13]}"         
            "[squawk]" => "%{[data][14]}"               
            "[spi]" => "%{[data][15]}"                  
            "[position_source]" => "%{[data][16]}"      
        }
        remove_field => [ "data" ]
    }

    # Callsign often has additional whitespace, remove it.
    mutate {
        strip => ["callsign"]    
    }

    if [icao24] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for icao24 null value" 
            remove_field => ["[icao24]"]
        }
    }
    if [callsign] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for callsign null value" 
            remove_field => ["[callsign]"]
        }
    }
    if [origin_country] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for origin_country null value" 
            remove_field => ["[origin_country]"]
        }
    }
    if [time_position] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for time_position null value" 
            remove_field => ["[time_position]"]
        }
    }
    if [last_contact] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for last_contact null value" 
            remove_field => ["[last_contact]"]
        }
    }
    if [longitude] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for longitude null value" 
            remove_field => ["[longitude]"]
        }
    }
    if [latitude] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for latitude null value" 
            remove_field => ["[latitude]"]
        }
    }
    if [baro_altitude] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for baro_altitude null value" 
            remove_field => ["[baro_altitude]"]
        }
    }
    if [on_ground] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for on_ground null value" 
            remove_field => ["[on_ground]"]
        }
    }
    if [velocity] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for velocity null value" 
            remove_field => ["[velocity]"]
        }
    }
    if [true_track] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for true_track null value" 
            remove_field => ["[true_track]"]
        }
    }
    if [vertical_rate] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for vertical_rate null value" 
            remove_field => ["[vertical_rate]"]
        }
    }
    if [sensors] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for sensors null value" 
            remove_field => ["[sensors]"]
        }
    }
    if [geo_altitude] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for geo_altitude null value" 
            remove_field => ["[geo_altitude]"]
        }
    }
    if [squawk] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for squawk null value" 
            remove_field => ["[squawk]"]
        }
    }
    if [spi] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for spi null value" 
            remove_field => ["[spi]"]
        }
    }
    if [position_source] =~ /(?:%{\[data\]\[\d+]})/ {
        mutate {
            id => "Check for position_source null value" 
            remove_field => ["[position_source]"]
        }
    }

    # check latitude and longitude exist
    if ([latitude] or [latitude] =~ /.*/) and ([latitude] or [latitude] =~ /.*/) {
        mutate {
            id => "Create geo point"
            add_field => {
                "[location][lat]" => "%{[latitude]}"
                "[location][lon]" => "%{[longitude]}"
            }
        }
    }  

    # time_position is a better timestamp, but may not always be present in dataset
    if ([time_position] or [time_position] =~ /.*/) {
        date {
            id => "If time position exists, use for @timestamp"
            match => ["[time_position]", "UNIX"]
        } 
    } else {
        # if we don't have time_position, use last_contact which is always present
        date {
            id => "If time_position does not exist, use last_contact for @timestamp"
            match => ["[last_contact]", "UNIX"]
        }
    } 

    mutate {
        id => "Add data stream fields"
        add_field => {
            "[data_stream][type]" => "demos"
            "[data_stream][dataset]" => "aircraft"
            "[data_stream][namespace]" => "adsb" 
        }
    }
}

output {
    elasticsearch {
        id => "ES Datastream Output"
        hosts => ["${ES_ENDPOINT}"]
        api_key => "${ES_API_KEY_ID}:${ES_API_KEY}"
        data_stream => true
        silence_errors_in_log => ["version_conflict_engine_exception"]
    }
}
