name: Daily Flight Briefing
description: >-
  AI-powered daily briefing — aggregates 24h ADS-B flight statistics
  (unique aircraft, busiest airports, regional traffic, emergency squawks)
  and posts a natural-language summary to Slack.
enabled: true
tags: ["adsb", "briefing", "scheduled", "ai"]

consts:
  indexName: "demos-aircraft-adsb"
  lookbackWindow: "now-24h"

triggers:
  - type: scheduled
    with:
      rrule:
        freq: DAILY
        interval: 1
        tzid: Europe/London
        byhour: [8]
        byminute: [0]
  - type: manual

steps:
  - name: aggregate_stats
    type: elasticsearch.request
    with:
      method: POST
      path: "/demos-aircraft-adsb/_search"
      body:
        size: 0
        query:
          range:
            "@timestamp":
              gte: "now-24h"
        aggs:
          unique_aircraft:
            cardinality:
              field: icao24
          busiest_airports:
            terms:
              field: airport.iata_code
              size: 10
              order:
                unique_flights: desc
            aggs:
              unique_flights:
                cardinality:
                  script:
                    source: "doc['icao24'].value + ':' + doc['callsign'].value"
                    lang: painless
          origin_countries:
            terms:
              field: origin_country
              size: 10
              order:
                unique_aircraft: desc
            aggs:
              unique_aircraft:
                cardinality:
                  field: icao24
          activity_breakdown:
            terms:
              field: airport.activity
            aggs:
              unique_flights:
                cardinality:
                  script:
                    source: "doc['icao24'].value + ':' + doc['callsign'].value + ':' + doc['airport.iata_code'].value"
                    lang: painless
          traffic_by_subregion:
            terms:
              field: geo.SUBREGION
              size: 15
              order:
                unique_aircraft: desc
            aggs:
              unique_aircraft:
                cardinality:
                  field: icao24
          traffic_by_continent:
            terms:
              field: geo.CONTINENT
              size: 7
              order:
                unique_aircraft: desc
            aggs:
              unique_aircraft:
                cardinality:
                  field: icao24
          ground_vs_airborne:
            terms:
              field: on_ground
            aggs:
              unique_aircraft:
                cardinality:
                  field: icao24
          emergency_squawks:
            filters:
              filters:
                hijack_7500:
                  term:
                    squawk: "7500"
                radio_failure_7600:
                  term:
                    squawk: "7600"
                general_emergency_7700:
                  term:
                    squawk: "7700"
            aggs:
              unique_aircraft:
                cardinality:
                  field: icao24

  - name: fetch_hijack_cases
    type: kibana.request
    with:
      method: GET
      path: "__SPACE_PREFIX__/api/cases/_find?tags=squawk-7500&owner=observability&perPage=100&sortField=createdAt&sortOrder=desc"
    on-failure:
      continue: true

  - name: generate_briefing
    type: ai.agent
    with:
      agent_id: "adsb_daily_briefing_agent"
      message: |
        Generate the daily ADS-B flight briefing from the following
        24-hour aggregated statistics:

        {{ steps.aggregate_stats.output.aggregations | json:2 }}

        === HIJACK INVESTIGATION CASES ===
        The following are squawk 7500 (hijack) investigation cases from
        Kibana case management. Each case has tags that include the verdict
        (verdict:genuine or verdict:false_positive). Use created_at timestamps
        to identify cases from the last 24 hours. If this section is empty
        or shows an error, state "Hijack case data unavailable" and skip
        section 10.

        {{ steps.fetch_hijack_cases.output | json:2 }}

        Include all sections from your Briefing Format (items 1–10).

        IMPORTANT — deduplicated counts:
        Each bucket aggregation now contains a sub-aggregation with the
        deduplicated count. Use these values instead of doc_count:
        - busiest_airports → unique_flights.value (unique icao24:callsign pairs per airport)
        - activity_breakdown → unique_flights.value (unique icao24:callsign:airport tuples per activity).
          NOTE: activity_breakdown covers ONLY aircraft detected within airport
          airspace zones — it is NOT a breakdown of all traffic. Label it clearly
          as "Airport Zone Activity" and avoid percentages that imply full-dataset scope.
        - origin_countries → unique_aircraft.value (unique icao24 per country)
        - traffic_by_subregion / traffic_by_continent → unique_aircraft.value
        - ground_vs_airborne → unique_aircraft.value.
          NOTE: these buckets OVERLAP — the same aircraft appears in both
          on_ground=true and on_ground=false if it landed or took off during
          the 24h window. Do NOT present this as a ratio. Instead report:
          (a) "X aircraft were detected on the ground at least once"
          (b) "exclusively airborne" = unique_aircraft.value (top-level)
              minus unique_aircraft.value (on_ground=true bucket). These are
              aircraft never detected on the ground — long-haul overflights,
              oceanic transits, or high-altitude routes. This is the more
              noteworthy figure.
        - emergency_squawks → unique_aircraft.value
        The doc_count still appears but reflects raw observations — do NOT
        use it for counts in the briefing. Always prefer the sub-agg value.

        IMPORTANT — executive summary framing:
        When summarising ground vs airborne in the executive summary, do NOT
        say "ground outpaced airborne" or frame them as opposing categories.
        The on-ground count is inclusive (at least once), while exclusively-
        airborne is the remainder. Lead with the exclusively-airborne count
        as the more interesting figure.

        Format the output for Slack mrkdwn (NOT standard Markdown):
        - Use *single asterisks* for bold, _underscores_ for italic
        - NEVER use # headers, **double asterisks**, | pipe tables |, or --- horizontal rules
        - Use blank lines and *Bold Section Headers* to separate sections
        - Present ranked/tabular data inside triple-backtick code blocks with fixed-width justified spacing:
          - Left-align text columns, right-align numeric columns
          - Pad with spaces so columns align in monospaced font
        - Always show airports as IATA code + full airport name
        - Use bullet lists for non-tabular data

        Example code-block table:
        ```
        Airport                  Unique Flights
        LGA  New York LaGuardia           1,204
        ATL  Atlanta                      1,087
        DAL  Dallas Love Field              953
        ```

  - name: post_to_slack
    type: slack
    connector-id: "__SLACK_CONNECTOR_ID__"
    with:
      message: |
        :airplane: *Daily ADS-B Flight Briefing*
        _Generated {{ execution.startedAt }}_

        {{ steps.generate_briefing.output }}

        :bar_chart: <__KB_ENDPOINT__/app/dashboards#/view/06362a65-7aa3-5854-aea9-46954b3140fc?_g=(filters:!(),refreshInterval:(pause:!t,value:60000),time:(from:now-24h,to:now))|Open Dashboard>

    on-failure:
      continue: true
