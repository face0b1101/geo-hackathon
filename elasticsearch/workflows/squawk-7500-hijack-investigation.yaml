name: Squawk 7500 Hijack Investigation
description: >-
  Alert-triggered investigation workflow for squawk 7500 (hijack) signals.
  Runs once per aircraft via ES|QL per-row alert grouping. Deduplicates
  against open cases using a composite icao24:callsign tag, creates a
  Kibana case with attached alert, enriches with flight history and
  external data (adsbdb aircraft/route, adsb.lol live position, GNews
  news search), invokes the hijack assessment agent for AI-powered
  false-positive analysis, and tags the case with the AI triage
  assessment — Slack notification for genuine threats, human review
  for false positives.
enabled: true
tags: ["adsb", "squawk-7500", "hijack", "alert", "ai", "cases"]

consts:
  indexName: "demos-aircraft-adsb"
  historyWindow: "now-6h"

triggers:
  - type: alert

steps:
  # ------------------------------------------------------------------
  # 0. Dedup — check for an existing open case for this aircraft.
  #    Alert grouping fields come from the ES|QL KEEP clause:
  #      event.alerts[0].kibana.alert.grouping.{icao24, callsign, …}
  # ------------------------------------------------------------------
  - name: find_existing_case
    type: kibana.request
    with:
      method: GET
      path: "__SPACE_PREFIX__/api/cases/_find?tags=icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}:callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}&status=open&perPage=1"

  - name: new_aircraft_only
    type: if
    condition: "${{ steps.find_existing_case.output.total == 0 }}"
    steps:
      # ----------------------------------------------------------------
      # 1. Fetch the full enriched document for fields not in the
      #    ES|QL KEEP clause (geo.*, airport.*).
      # ----------------------------------------------------------------
      - name: fetch_enriched_doc
        type: elasticsearch.search
        with:
          index: "demos-aircraft-adsb"
          query:
            bool:
              filter:
                - term:
                    icao24: "{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                - range:
                    "@timestamp":
                      gte: "now-10m"
          size: 1

      # ----------------------------------------------------------------
      # 2. Create case for this aircraft
      # ----------------------------------------------------------------
      - name: create_case
        type: kibana.createCase
        with:
          owner: observability
          connector:
            id: "none"
            name: "none"
            type: ".none"
            fields: null
          settings:
            syncAlerts: true
          title: >-
            Squawk 7500 (Hijack) —
            {{ event.alerts[0].kibana.alert.grouping.callsign }}
            ({{ event.alerts[0].kibana.alert.grouping.icao24 }})
          category: "Hijack Triage"
          description: |
            Automated investigation triggered by squawk 7500 detection.

            *Aircraft:* {{ event.alerts[0].kibana.alert.grouping.icao24 }}
            *Callsign:* {{ event.alerts[0].kibana.alert.grouping.callsign }}
            *Origin country:* {{ event.alerts[0].kibana.alert.grouping.origin_country }}
            *Position:* {{ event.alerts[0].kibana.alert.grouping.latitude }}, {{ event.alerts[0].kibana.alert.grouping.longitude }}
            *Altitude:* {{ event.alerts[0].kibana.alert.grouping.baro_altitude }}m
            *Velocity:* {{ event.alerts[0].kibana.alert.grouping.velocity }} m/s
            *On ground:* {{ event.alerts[0].kibana.alert.grouping.on_ground }}
            *Region:* {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.geo.NAME | default: "unknown" }}, {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.geo.SUBREGION | default: "unknown" }}
            *Dashboard:* __KB_ENDPOINT__/app/dashboards#/view/__DASHBOARD_AIRCRAFT_DETAIL_ID__?_g=(time:(from:now-6h,to:now))&_a=(filters:!((query:(match_phrase:(icao24:'{{ event.alerts[0].kibana.alert.grouping.icao24 }}')))))
          tags:
            - "squawk-7500"
            - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
            - "callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
            - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}:callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
            - "auto-investigation"
          customFields:
            - key: icao24
              type: text
              value: "{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
            - key: callsign
              type: text
              value: "{{ event.alerts[0].kibana.alert.grouping.callsign }}"
            - key: ai_triage_assessment
              type: text
              value: null
            - key: confidence
              type: text
              value: null

      # ----------------------------------------------------------------
      # 3. Attach the triggering alert to the case
      # ----------------------------------------------------------------
      - name: attach_alert
        type: kibana.request
        with:
          method: POST
          path: "__SPACE_PREFIX__/api/cases/{{ steps.create_case.output.id }}/comments"
          body:
            type: alert
            alertId: "{{ event.alerts[0]._id }}"
            index: "{{ event.alerts[0]._index }}"
            owner: observability
            rule:
              id: "{{ event.rule.id }}"
              name: "{{ event.rule.name }}"
        on-failure:
          continue: true

      # ----------------------------------------------------------------
      # 4. Enrich — 6-hour flight history
      # ----------------------------------------------------------------
      - name: flight_history
        type: elasticsearch.search
        with:
          index: "demos-aircraft-adsb"
          query:
            bool:
              filter:
                - term:
                    icao24: "{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                - range:
                    "@timestamp":
                      gte: "{{ consts.historyWindow }}"
          size: 200

      # ----------------------------------------------------------------
      # 5a. Correlate — adsbdb aircraft metadata (always runs)
      # ----------------------------------------------------------------
      - name: adsbdb_aircraft
        type: http
        with:
          url: "https://api.adsbdb.com/v0/aircraft/{{ event.alerts[0].kibana.alert.grouping.icao24 | upcase }}"
          method: GET
        on-failure:
          continue: true

      # ----------------------------------------------------------------
      # 5b. Correlate — adsbdb expected route (only when callsign known)
      # ----------------------------------------------------------------
      - name: has_callsign
        type: if
        condition: "${{ event.alerts[0].kibana.alert.grouping.callsign != '' }}"
        steps:
          - name: adsbdb_route
            type: http
            with:
              url: "https://api.adsbdb.com/v0/callsign/{{ event.alerts[0].kibana.alert.grouping.callsign }}"
              method: GET
            on-failure:
              continue: true

      # ----------------------------------------------------------------
      # 6. Correlate — adsb.lol live position cross-reference
      # ----------------------------------------------------------------
      - name: adsblol_lookup
        type: http
        with:
          url: "https://api.adsb.lol/v2/icao/{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
          method: GET
        on-failure:
          continue: true

      # ----------------------------------------------------------------
      # 7. Correlate — GNews news search (optional)
      # ----------------------------------------------------------------
      - name: news_search
        type: http
        with:
          url: "https://gnews.io/api/v4/search?q={{ event.alerts[0].kibana.alert.grouping.callsign }}%20hijack&max=5&apikey=__GNEWS_API_KEY__"
          method: GET
        on-failure:
          continue: true

      # ----------------------------------------------------------------
      # 8. AI assessment — invoke the hijack assessment agent
      # ----------------------------------------------------------------
      - name: ai_assessment
        type: ai.agent
        with:
          agent_id: "adsb_hijack_assessment_agent"
          message: |
            Assess whether this squawk 7500 signal is genuine or a false positive.
            All enrichment data is provided below — do NOT call the enrichment
            workflow tool; assess directly from this data.

            Format your response using the structured output format from your
            instructions (title line, AI Triage Assessment, Confidence,
            Reasoning with key-evidence bullets). The workflow parses the
            "**AI Triage Assessment:**" line for routing, so it must read
            exactly:
              **AI Triage Assessment:** `genuine`
            or
              **AI Triage Assessment:** `false_positive`

            === TRIGGERING EVENT ===
            ICAO24: {{ event.alerts[0].kibana.alert.grouping.icao24 }}
            Callsign: {{ event.alerts[0].kibana.alert.grouping.callsign }}
            Origin country: {{ event.alerts[0].kibana.alert.grouping.origin_country }}
            Position: {{ event.alerts[0].kibana.alert.grouping.latitude }}, {{ event.alerts[0].kibana.alert.grouping.longitude }}
            Altitude: {{ event.alerts[0].kibana.alert.grouping.baro_altitude }}m barometric / {{ event.alerts[0].kibana.alert.grouping.geo_altitude }}m geometric
            Velocity: {{ event.alerts[0].kibana.alert.grouping.velocity }} m/s
            Heading: {{ event.alerts[0].kibana.alert.grouping.true_track }}°
            Vertical rate: {{ event.alerts[0].kibana.alert.grouping.vertical_rate }} m/s
            On ground: {{ event.alerts[0].kibana.alert.grouping.on_ground }}
            Nearest airport: {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.airport.name | default: "unknown" }} ({{ steps.fetch_enriched_doc.output.hits.hits[0]._source.airport.iata_code | default: "?" }}, {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.airport.activity | default: "?" }})
            Region: {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.geo.NAME | default: "unknown" }}, {{ steps.fetch_enriched_doc.output.hits.hits[0]._source.geo.SUBREGION | default: "unknown" }} ({{ steps.fetch_enriched_doc.output.hits.hits[0]._source.geo.CONTINENT | default: "unknown" }})

            === FLIGHT HISTORY (last 6 hours, {{ steps.flight_history.output.hits.total.value }} data points) ===
            {{ steps.flight_history.output.hits.hits | json:2 }}

            === AIRCRAFT METADATA (adsbdb) ===
            {{ steps.adsbdb_aircraft.output | json:2 }}

            === EXPECTED ROUTE (adsbdb — empty if callsign unknown) ===
            {{ steps.adsbdb_route.output | json:2 }}

            === LIVE POSITION CROSS-REFERENCE (adsb.lol) ===
            {{ steps.adsblol_lookup.output | json:2 }}

            === NEWS SEARCH (GNews — empty if API key not configured) ===
            {{ steps.news_search.output | json:2 }}

      # ----------------------------------------------------------------
      # 9. Update case with AI assessment and enrichment summary
      # ----------------------------------------------------------------
      - name: update_case_enrichment
        type: kibana.request
        with:
          method: POST
          path: "__SPACE_PREFIX__/api/cases/{{ steps.create_case.output.id }}/comments"
          body:
            type: user
            owner: observability
            comment: |
              {{ steps.ai_assessment.output }}

              ---

              **Data sources consulted:**
              - Flight history: {{ steps.flight_history.output.hits.total.value }} data points (last 6 hours)
              - Aircraft registry (adsbdb): {{ steps.adsbdb_aircraft.output.data.response.aircraft.type | default: "unavailable" }} — {{ steps.adsbdb_aircraft.output.data.response.aircraft.registered_owner | default: "unknown" }}
              - Expected route (adsbdb): {{ steps.adsbdb_route.output.data.response.flightroute.origin.iata_code | default: "?" }} → {{ steps.adsbdb_route.output.data.response.flightroute.destination.iata_code | default: "?" }}
              - Live tracking (adsb.lol): cross-referenced
              - News search (GNews): consulted

              :bar_chart: [Aircraft Detail Dashboard](<__KB_ENDPOINT__/app/dashboards#/view/__DASHBOARD_AIRCRAFT_DETAIL_ID__?_g=(time:(from:now-6h,to:now))&_a=(filters:!((query:(match_phrase:(icao24:'{{ event.alerts[0].kibana.alert.grouping.icao24 }}')))))>)

      # ----------------------------------------------------------------
      # 10. Re-fetch case for current version (after comment changed it)
      # ----------------------------------------------------------------
      - name: refetch_case
        type: kibana.request
        with:
          method: GET
          path: "__SPACE_PREFIX__/api/cases/{{ steps.create_case.output.id }}"

      # ----------------------------------------------------------------
      # 11. Route — Slack for genuine, tag for false positive
      #     Cases are never auto-closed; a human reviews and closes.
      # ----------------------------------------------------------------
      - name: route_triage
        type: if
        condition: "${{ steps.ai_assessment.output contains '**AI Triage Assessment:** `genuine`' }}"
        steps:
          # PATCH replaces the entire customFields array, so all
          # fields must be included to avoid losing values.
          - name: tag_genuine
            type: kibana.request
            with:
              method: PATCH
              path: "__SPACE_PREFIX__/api/cases"
              body:
                cases:
                  - id: "{{ steps.create_case.output.id }}"
                    version: "{{ steps.refetch_case.output.version }}"
                    tags:
                      - "squawk-7500"
                      - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                      - "callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}:callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - "auto-investigation"
                      - "triage:genuine"
                    customFields:
                      - key: icao24
                        type: text
                        value: "{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                      - key: callsign
                        type: text
                        value: "{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - key: ai_triage_assessment
                        type: text
                        value: "genuine"
                      - key: confidence
                        type: text
                        value: null
          - name: notify_slack
            type: slack
            connector-id: "__SLACK_CONNECTOR_ID__"
            with:
              message: |
                :rotating_light: *Squawk 7500 — Potential Hijack*
                _{{ execution.startedAt }}_

                *Aircraft:* {{ event.alerts[0].kibana.alert.grouping.callsign }} ({{ event.alerts[0].kibana.alert.grouping.icao24 }})
                *Origin:* {{ event.alerts[0].kibana.alert.grouping.origin_country }}
                *Position:* {{ event.alerts[0].kibana.alert.grouping.latitude }}, {{ event.alerts[0].kibana.alert.grouping.longitude }}
                *Altitude:* {{ event.alerts[0].kibana.alert.grouping.baro_altitude }}m

                {{ steps.ai_assessment.output }}

                :open_file_folder: <__KB_ENDPOINT__/app/observability/cases/{{ steps.create_case.output.id }}|Open Case>
                :bar_chart: <__KB_ENDPOINT__/app/dashboards#/view/__DASHBOARD_AIRCRAFT_DETAIL_ID__?_g=(time:(from:now-6h,to:now))&_a=(filters:!((query:(match_phrase:(icao24:'{{ event.alerts[0].kibana.alert.grouping.icao24 }}')))))|Aircraft Detail Dashboard>
            on-failure:
              continue: true
        else:
          # PATCH replaces the entire customFields array, so all
          # fields must be included to avoid losing values.
          - name: tag_false_positive
            type: kibana.request
            with:
              method: PATCH
              path: "__SPACE_PREFIX__/api/cases"
              body:
                cases:
                  - id: "{{ steps.create_case.output.id }}"
                    version: "{{ steps.refetch_case.output.version }}"
                    tags:
                      - "squawk-7500"
                      - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                      - "callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - "icao24:{{ event.alerts[0].kibana.alert.grouping.icao24 }}:callsign:{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - "auto-investigation"
                      - "triage:false_positive"
                    customFields:
                      - key: icao24
                        type: text
                        value: "{{ event.alerts[0].kibana.alert.grouping.icao24 }}"
                      - key: callsign
                        type: text
                        value: "{{ event.alerts[0].kibana.alert.grouping.callsign }}"
                      - key: ai_triage_assessment
                        type: text
                        value: "false_positive"
                      - key: confidence
                        type: text
                        value: null
