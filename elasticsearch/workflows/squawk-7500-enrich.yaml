name: Squawk 7500 Enrich
description: >-
  Gathers enrichment data for a squawk 7500 investigation — flight history
  from Elasticsearch, aircraft metadata and expected route from adsbdb, live
  position cross-reference from adsb.lol, and news search from GNews.
  Designed as a workflow tool for the hijack assessment agent.
enabled: true
tags: ["adsb", "squawk-7500", "enrichment"]

consts:
  indexName: "demos-aircraft-adsb"
  historyWindow: "now-6h"

inputs:
  - name: icao24
    type: string
    required: true
    description: "ICAO 24-bit aircraft address (hex, e.g. A9ED41)"
  - name: callsign
    type: string
    required: false
    default: ""
    description: "Flight callsign (e.g. DAL1234). Optional but improves adsbdb route lookup."

triggers:
  - type: manual

steps:
  # ------------------------------------------------------------------
  # 1. Flight history — last 6 hours of position data for this aircraft
  # ------------------------------------------------------------------
  - name: flight_history
    type: elasticsearch.search
    with:
      index: "demos-aircraft-adsb"
      query:
        bool:
          filter:
            - term:
                icao24: "{{ inputs.icao24 }}"
            - range:
                "@timestamp":
                  gte: "{{ consts.historyWindow }}"
      size: 200
      sort:
        - "@timestamp"

  # ------------------------------------------------------------------
  # 2. Latest position snapshot for this aircraft
  # ------------------------------------------------------------------
  - name: latest_position
    type: elasticsearch.request
    with:
      method: POST
      path: "/demos-aircraft-adsb/_search"
      body:
        query:
          bool:
            filter:
              - term:
                  icao24: "{{ inputs.icao24 }}"
        size: 1
        sort:
          - "@timestamp":
              order: desc

  # ------------------------------------------------------------------
  # 3. adsbdb — aircraft metadata + expected route
  #    Combined call returns both when the callsign is known; falls back
  #    to ICAO24-only lookup when the callsign is unrecognised.
  # ------------------------------------------------------------------
  - name: adsbdb_lookup
    type: http
    with:
      url: "https://api.adsbdb.com/v0/aircraft/{{ inputs.icao24 | upcase }}?callsign={{ inputs.callsign }}"
      method: GET
    on-failure:
      fallback:
        - name: adsbdb_fallback
          type: http
          with:
            url: "https://api.adsbdb.com/v0/aircraft/{{ inputs.icao24 | upcase }}"
            method: GET
          on-failure:
            continue: true
      continue: true

  # ------------------------------------------------------------------
  # 4. adsb.lol — live position cross-reference
  # ------------------------------------------------------------------
  - name: adsblol_lookup
    type: http
    with:
      url: "https://api.adsb.lol/v2/icao/{{ inputs.icao24 }}"
      method: GET
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 5. GNews — news search (optional, needs GNEWS_API_KEY)
  # ------------------------------------------------------------------
  - name: news_search
    type: http
    with:
      url: "https://gnews.io/api/v4/search?q={{ inputs.callsign }}%20hijack&max=5&apikey=__GNEWS_API_KEY__"
      method: GET
    on-failure:
      continue: true
