name: Squawk 7500 Enrich
description: >-
  Gathers enrichment data for a squawk 7500 investigation — flight history
  from Elasticsearch, aircraft metadata and expected route from adsbdb, live
  position cross-reference from adsb.lol, and news search from GNews.
  Designed as a workflow tool for the hijack assessment agent.
enabled: true
tags: ["adsb", "squawk-7500", "enrichment"]

outputs:
  flight_history:
    value: "${{ steps.flight_history.output }}"
  latest_position:
    value: "${{ steps.latest_position.output }}"
  adsbdb_aircraft:
    value: "${{ steps.adsbdb_aircraft.output }}"
  adsbdb_route:
    value: "${{ steps.adsbdb_route.output }}"
  adsblol_lookup:
    value: "${{ steps.adsblol_lookup.output }}"
  news_search:
    value: "${{ steps.news_search.output }}"

consts:
  indexName: "demos-aircraft-adsb"
  historyWindow: "now-6h"

inputs:
  - name: icao24
    type: string
    required: true
    description: "ICAO 24-bit aircraft address (hex, e.g. A9ED41)"
  - name: callsign
    type: string
    required: false
    default: ""
    description: "Flight callsign (e.g. DAL1234). Optional but improves adsbdb route lookup."

triggers:
  - type: manual

steps:
  # ------------------------------------------------------------------
  # 1. Flight history — last 6 hours of position data for this aircraft
  # ------------------------------------------------------------------
  - name: flight_history
    type: elasticsearch.search
    with:
      index: "demos-aircraft-adsb"
      query:
        bool:
          filter:
            - term:
                icao24: "{{ inputs.icao24 }}"
            - range:
                "@timestamp":
                  gte: "{{ consts.historyWindow }}"
      size: 200
      sort:
        - "@timestamp"

  # ------------------------------------------------------------------
  # 2. Latest position snapshot for this aircraft
  # ------------------------------------------------------------------
  - name: latest_position
    type: elasticsearch.request
    with:
      method: POST
      path: "/demos-aircraft-adsb/_search"
      body:
        query:
          bool:
            filter:
              - term:
                  icao24: "{{ inputs.icao24 }}"
        size: 1
        sort:
          - "@timestamp":
              order: desc

  # ------------------------------------------------------------------
  # 3a. adsbdb — aircraft metadata (always runs)
  # ------------------------------------------------------------------
  - name: adsbdb_aircraft
    type: http
    with:
      url: "https://api.adsbdb.com/v0/aircraft/{{ inputs.icao24 | upcase }}"
      method: GET
    on-failure:
      continue: true

  # WORKAROUND(#9): Write adsbdb response to cache index
  - name: cache_adsbdb
    type: elasticsearch.request
    with:
      method: PUT
      path: "/adsb-enrichment-cache/_doc/adsbdb:{{ inputs.icao24 }}"
      body:
        type: "adsbdb_aircraft"
        icao24: "{{ inputs.icao24 }}"
        raw: "{{ steps.adsbdb_aircraft.output | json }}"
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 3b. adsbdb — expected route (only when callsign provided)
  # ------------------------------------------------------------------
  - name: has_callsign
    type: if
    condition: "${{ inputs.callsign != '' }}"
    steps:
      - name: adsbdb_route
        type: http
        with:
          url: "https://api.adsbdb.com/v0/callsign/{{ inputs.callsign }}"
          method: GET
        on-failure:
          continue: true

      # WORKAROUND(#9): Write adsbdb route response to cache index
      - name: cache_adsbdb_route
        type: elasticsearch.request
        with:
          method: PUT
          path: "/adsb-enrichment-cache/_doc/adsbdb_route:{{ inputs.callsign }}"
          body:
            type: "adsbdb_route"
            callsign: "{{ inputs.callsign }}"
            icao24: "{{ inputs.icao24 }}"
            raw: "{{ steps.adsbdb_route.output | json }}"
        on-failure:
          continue: true

  # ------------------------------------------------------------------
  # 4. adsb.lol — live position cross-reference (always fetch fresh)
  # ------------------------------------------------------------------
  - name: adsblol_lookup
    type: http
    with:
      url: "https://api.adsb.lol/v2/icao/{{ inputs.icao24 }}"
      method: GET
    on-failure:
      continue: true

  # WORKAROUND(#9): Write adsb.lol response to cache index
  - name: cache_adsblol
    type: elasticsearch.request
    with:
      method: PUT
      path: "/adsb-enrichment-cache/_doc/adsblol:{{ inputs.icao24 }}"
      body:
        type: "adsblol_position"
        icao24: "{{ inputs.icao24 }}"
        raw: "{{ steps.adsblol_lookup.output | json }}"
    on-failure:
      continue: true

  # ------------------------------------------------------------------
  # 5. GNews — news search (optional, needs GNEWS_API_KEY)
  # ------------------------------------------------------------------
  - name: news_search
    type: http
    with:
      url: "https://gnews.io/api/v4/search?q={{ inputs.callsign }}%20hijack&max=5&apikey=__GNEWS_API_KEY__"
      method: GET
    on-failure:
      continue: true

  # WORKAROUND(#9): Write GNews response to cache index
  - name: cache_gnews
    type: elasticsearch.request
    with:
      method: PUT
      path: "/adsb-enrichment-cache/_doc/gnews:{{ inputs.callsign }}"
      body:
        type: "gnews_search"
        callsign: "{{ inputs.callsign }}"
        icao24: "{{ inputs.icao24 }}"
        raw: "{{ steps.news_search.output | json }}"
    on-failure:
      continue: true
